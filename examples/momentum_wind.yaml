# Native momentum-wind wind bridge — standalone example config for
# Step 25b. (No code imports this file; it's a copy-paste template for
# `wind: model: momentum`. Load it with mt.load_config(...).)
#
# Drives the simulator with the in-repo 3-D momentum-wind solver
# (mechatree.wind.momentum_wind). Each generation the model is run
# once on the current forest geometry, returning a canopy-mean wind
# vector that feeds into pruning.
#
# See docs/momentum_wind_derivation.md for the per-cell math
# (per-branch drag → bincount → momentum-wind → cross-stream
# diffusion).
#
# No optional extras needed — the kernel is pure NumPy.

tree:
  twig_length: 1.0
  twig_diameter: 0.1

forest:
  size: 8.0
  n_trees_init: 3
  n_trees_max: 12

wind:
  model: momentum

  # Grid cell size (uniform x/y/z). Must satisfy grid_size >= max branch
  # length so each branch fits in one cell (centroid binning, no
  # subdivision). Default 2 sits at the O(branches)≈O(cells) cost knee
  # while keeping the vertical + intra-crown wind gradient resolved.
  grid_size: 2.0

  # Cross-stream diffusion knob (the only turbulence parameter). The
  # legacy k-ε closure collapses to ``nu_t ≈ 0.034 · U_∞`` at default
  # I_turb=0.1, l_mix=0.5 — we expose that single number directly.
  # Larger nu_diff ⇒ wider wake; nu_diff = 0 ⇒ sharp wake with no
  # lateral mixing.
  momentum_nu_diff: 0.03

  # Padding around the canopy bounding box. pad_x downstream needs to
  # be large enough for the wake to develop; pad_y and pad_z keep the
  # boundary conditions outside the canopy.
  momentum_pad_x: 12.0
  momentum_pad_y: 2.0
  momentum_pad_z: 3.0

  # Inflow profile. Two choices:
  #   - Uniform: U_in = K independent of height z (set the key below).
  #     K here is the ~1-in-100-yr storm amplitude from the default
  #     long-tail formula a = 0.835 - log(U)/6 with U = 1/100  (≈ 1.60).
  #   - Log-law: U(z) = (ua / kappa) * log(max(z, z0) / z0). Omit
  #     momentum_U_uniform and set momentum_ua/z0/kappa instead.
  momentum_U_uniform: 1.60
  # momentum_ua: 0.4
  # momentum_z0: 0.1
  # momentum_kappa: 0.41

  # Per-branch drag coefficient (shared with the other canopy-aware
  # models).
  C_D: 1.0

  # Step 24 fixed-point cap. The momentum model is canopy-aware (3-arg
  # WindFn), so the wind ↔ pruning loop iterates after each cut
  # sweep until convergence; raise the cap on big-storm runs.
  max_pruning_iterations: 4
  wind_convergence_eps_rel: 0.02

n_generations: 30
