# Example configuration for mechatree.simulate.grow_tree.
#
# All sections are optional — omitted fields fall back to the defaults in
# mechatree.config. The Fortran .ini names appear in the comments so
# cross-referencing the paper and legacy code stays mechanical.

tree:
  twig_length: 1.0           # was TwigLength
  twig_diameter: 0.1         # was TwigDiameter
  leaf_surface: 0.25         # was LeafSurface (S0)
  cauchy: 2.0e-5             # was Cauchy (material stiffness Cy) — Forest.ini runtime value
  volume_ratio_leaf: 4.0     # was VolumeRatioLeaf; Nat Commun reference (SI Fig. S12 V_prod = 4 V0 l)
  maintenance_h: 0.02        # was MaintenanceH
  max_branches: 10000        # was Nmax

  # Branching geometry. The Fortran derives these from genes 1..3; we expose
  # them directly so users without a genome can still grow a plausible tree.
  theta1: 0.7853981633974483   #  pi / 4 — left daughter
  theta2: -0.7853981633974483  # -pi / 4 — right daughter
  gamma1: 0.0
  gamma2: 3.141592653589793    #  pi

light:
  size_leaf: 1.0             # was SizeLeaf — 2D shadow-grid cell size
  n_elevations: 4            # was Nelev
  n_azimuths: 8              # was Nazim

forest:
  size: 100.0                # was SizeForest — disk radius
  n_trees_init: 100          # was Ntrees_ini
  n_trees_max: 10000         # was Ntrees_max
  # Death rule (Fortran defaults). A tree dies if
  #   (n_branches < min_branches AND age > min_age_for_undersize) OR age > max_age
  min_branches: 11
  min_age_for_undersize: 5
  max_age: 1000

# Genome constants — drop-in values from the Fortran neural_branch /
# neural_reserve networks (Eloy et al., Nat Commun 2017). `safety` is the
# multiplier of the just-breaks-under-nominal-wind volume that each branch
# targets: safety=3 keeps branches at ~(1/3)^(3/2) ≈ 0.19 of breaking stress.
genome:
  safety: 3.0                # was Safety (neural_branch output)
  p_seeds: 0.1               # was p_seeds (neural_reserve output [0])
  p_leaves: 0.5              # was p_leaves (neural_reserve output [1])
  phototropism: 0.5          # was phototropism (neural_reserve output [2])
  # Uncomment to use one of the paper's evolved species (NeuralSafety /
  # NeuralAllocation) instead of the constants above. `path` is resolved
  # relative to this YAML file. `species_id` picks which champion from the
  # JSON: 0 = "interior" cluster, 1 = "periphery" cluster (see the species
  # scatter in scripts/strategies_single_tree.py).
  # neural_from:
  #   path: ../data/S3_champions.json
  #   species_id: 0

# `n_generations` can sit here at top level or under `forest:`; the
# top-level one wins.
n_generations: 100
