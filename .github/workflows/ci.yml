name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv venv --python 3.12

      - name: Install package
        run: uv pip install -e ".[dev]"

      # ``uv run`` does an implicit ``uv sync --frozen`` first, which
      # validates every entry in uv.lock — including the editable
      # ``../DendroFlow`` source (gated on ``extra = "dendroflow"``). On
      # CI that sibling checkout does not exist, so the sync errors out
      # even though dendroflow is not in the ``dev`` extra. ``--no-sync``
      # skips the validation and runs ruff directly in the venv we just
      # populated by ``uv pip install`` above.
      - name: Ruff check
        run: uv run --no-sync ruff check .

      - name: Ruff format check
        run: uv run --no-sync ruff format --check .

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # macos-13 (Intel) lives only in wheels.yml — the GitHub-hosted
        # Intel-Mac runner pool is too constrained for routine CI matrix use.
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install package
        run: uv pip install -e ".[dev]"

      - name: Test
        run: uv run --no-sync pytest
