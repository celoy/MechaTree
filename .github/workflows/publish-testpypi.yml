name: Publish to TestPyPI

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the Wheels workflow to publish from (leave empty for latest)'
        required: false
        type: string

jobs:
  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC trusted publisher
    steps:
      - name: Download artifacts from latest Wheels run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: wheels.yml
          run_id: ${{ inputs.run_id }}
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
